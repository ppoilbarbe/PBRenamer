<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="doc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef2fc"/>
      <stop offset="1" stop-color="#ccd6ee"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d06800"/>
      <stop offset="1" stop-color="#f59000"/>
    </linearGradient>
  </defs>

  <!-- Left document (file to rename) -->
  <path d="M 6,20 L 40,20 L 52,32 L 52,106 L 6,106 Z"
        fill="url(#doc)" stroke="#4a6fa5" stroke-width="2" stroke-linejoin="round"/>
  <!-- Fold triangle -->
  <path d="M 40,20 L 52,32 L 40,32 Z" fill="#9aafd4"/>
  <!-- Letter A -->
  <text x="29" y="80" font-family="sans-serif" font-size="36" font-weight="bold"
        fill="#1e3a8a" text-anchor="middle">A</text>

  <!-- Right document (renamed result) -->
  <path d="M 76,20 L 110,20 L 122,32 L 122,106 L 76,106 Z"
        fill="url(#doc)" stroke="#4a6fa5" stroke-width="2" stroke-linejoin="round"/>
  <!-- Fold triangle -->
  <path d="M 110,20 L 122,32 L 110,32 Z" fill="#9aafd4"/>
  <!-- Letter B -->
  <text x="99" y="80" font-family="sans-serif" font-size="36" font-weight="bold"
        fill="#1e3a8a" text-anchor="middle">B</text>

  <!-- Orange arrow pointing right (A → B), centred at (64, 63) -->
  <polygon points="54,58 67,58 67,51 76,63 67,75 67,68 54,68"
           fill="url(#arrow)"/>
</svg>
