name: pbrenamer

channels:
  - conda-forge

dependencies:
  - python=3.12
  # GUI
  - pyside6
  # Tests
  - pytest
  - pytest-qt
  - pytest-cov
  # Docs
  - sphinx
  - sphinx-rtd-theme
  - sphinx-autobuild
  # Lint / hooks
  - ruff
  - pre-commit
  # GitHub CLI
  - gh
  # i18n tools (xgettext, msginit, msgmerge, msgfmt)
  - gettext
  # Metadata (EXIF/IPTC)
  - pillow
  # Metadata (audio tags)
  - mutagen
  # Metadata (video)
  - pymediainfo
  # Packaging
  - pyinstaller
  # Dev install (editable)
  - pip
  - pip:
      - -e ".[dev]"
